<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#3E2723">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Il Caffè">
<title>Il Mondo del Caffè · 咖啡世界</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fraunces:ital,wght@0,400;0,600;0,800;1,500&family=Noto+Serif+SC:wght@400;600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF3E7;
    --cream-deep: #F1E6D2;
    --espresso: #3E2723;
    --coffee: #6F4E37;
    --caramel: #C68B59;
    --gold: #D4A574;
    --leaf: #5C8A4C;
    --milk: #FFF8EC;
    --ink: #2B4A8C;
    --cherry: #C23B3B;
    --choco: #4A2C20;
    --shadow: 0 10px 25px rgba(62, 39, 35, 0.12), 0 4px 8px rgba(62, 39, 35, 0.08);
    --shadow-lg: 0 20px 50px rgba(62, 39, 35, 0.18), 0 8px 16px rgba(62, 39, 35, 0.1);
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--cream);
    font-family: 'Nunito', 'Noto Serif SC', sans-serif;
    color: var(--espresso);
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ======================== TOP BAR ======================== */
  .topbar {
    padding: calc(12px + var(--safe-top)) 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, var(--cream-deep), var(--cream));
    border-bottom: 1px solid rgba(110,78,55,0.1);
    z-index: 10;
  }
  .topbar h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: var(--espresso);
    letter-spacing: -0.01em;
  }
  .topbar h1 span {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    color: var(--coffee);
    margin-left: 6px;
    font-weight: 600;
  }
  .top-bean {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }
  .fav-counter {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--milk);
    padding: 6px 12px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--coffee);
    box-shadow: var(--shadow);
    cursor: pointer;
    border: none;
    transition: transform .15s;
  }
  .fav-counter:active { transform: scale(0.95); }

  /* ======================== MAIN AREA ======================== */
  .main {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at top, #FDF8EE 0%, #F1E6D2 100%);
  }
  .view {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    -webkit-overflow-scrolling: touch;
  }
  .view.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ======================== HOME VIEW ======================== */
  .home-view {
    padding: 20px 20px 30px;
  }
  .hero {
    text-align: center;
    padding: 30px 10px 24px;
  }
  .hero-bean { width: 90px; height: 90px; margin: 0 auto 12px; }
  .hero-title {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 1.9rem;
    line-height: 1.1;
    color: var(--espresso);
  }
  .hero-title em { color: var(--coffee); font-style: italic; }
  .hero-sub {
    font-family: 'Noto Serif SC', serif;
    color: var(--coffee);
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 0.1em;
  }
  .hero-hand {
    font-family: 'Caveat', cursive;
    color: var(--ink);
    font-size: 1.2rem;
    margin-top: 12px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 0 0 22px;
  }
  .stat-card {
    background: var(--milk);
    padding: 12px 8px;
    border-radius: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--espresso);
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--coffee);
    margin-top: 4px;
    font-weight: 600;
  }
  .stat-label-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.65rem;
    color: var(--coffee);
    opacity: 0.7;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--espresso);
    margin: 18px 4px 10px;
  }
  .section-title .zh-inline {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    color: var(--coffee);
    margin-left: 8px;
    font-weight: 600;
  }

  .categories {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .cat-card {
    background: var(--milk);
    border-radius: 20px;
    padding: 16px 14px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all .2s;
    box-shadow: var(--shadow);
    text-align: left;
    font-family: inherit;
    color: var(--espresso);
  }
  .cat-card:active { transform: scale(0.97); }
  .cat-card .cat-icon {
    font-size: 1.8rem;
    margin-bottom: 6px;
  }
  .cat-card .cat-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.1;
  }
  .cat-card .cat-name-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem;
    color: var(--coffee);
    font-weight: 500;
    margin-top: 2px;
  }
  .cat-card .cat-count {
    font-size: 0.7rem;
    color: var(--caramel);
    margin-top: 6px;
    font-weight: 700;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .mode-card {
    background: linear-gradient(135deg, var(--espresso), var(--coffee));
    color: var(--cream);
    padding: 18px 16px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    font-family: inherit;
    text-align: left;
    box-shadow: var(--shadow);
    transition: transform .15s;
  }
  .mode-card:active { transform: scale(0.97); }
  .mode-card.secondary {
    background: linear-gradient(135deg, var(--caramel), var(--gold));
  }
  .mode-card .mode-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
  .mode-card .mode-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.05rem;
    line-height: 1.1;
  }
  .mode-card .mode-name-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  /* ======================== LESSON / SLIDE VIEW ======================== */
  .lesson-view {
    display: flex;
    flex-direction: column;
  }
  .lesson-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--cream);
    border-bottom: 1px solid rgba(110,78,55,0.1);
  }
  .back-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: var(--milk);
    border-radius: 50%;
    font-size: 1.1rem;
    color: var(--espresso);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--cream-deep);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--caramel), var(--coffee));
    transition: width .4s ease;
    border-radius: 3px;
  }
  .page-indicator {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--coffee);
    min-width: 40px;
    text-align: right;
  }

  .slide-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .slide {
    position: absolute;
    inset: 0;
    padding: 20px 24px 80px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transition: opacity .4s ease, transform .4s ease;
    pointer-events: none;
    transform: translateX(40px);
    overflow-y: auto;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }
  .slide-category {
    text-align: center;
    font-family: 'Caveat', cursive;
    color: var(--caramel);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .slide-head {
    margin-top: 12px;
    text-align: center;
  }
  .it-title {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 2rem;
    line-height: 1.1;
    color: var(--espresso);
    letter-spacing: -0.02em;
  }
  .it-title em { font-style: italic; color: var(--coffee); font-weight: 600; }
  .zh-title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--coffee);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .action-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
  }
  .action-btn {
    width: 40px;
    height: 40px;
    border: none;
    background: var(--milk);
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
    transition: transform .15s;
    color: var(--espresso);
  }
  .action-btn:active { transform: scale(0.9); }
  .action-btn.active-fav {
    background: var(--cherry);
    color: white;
  }
  .action-btn.active-learn {
    background: var(--leaf);
    color: white;
  }

  .slide-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 14px 0;
  }
  .slide-foot {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.92rem;
    color: var(--coffee);
    opacity: 0.8;
    line-height: 1.4;
    padding: 0 8px;
  }
  .slide-foot .zh {
    font-family: 'Noto Serif SC', serif;
    font-style: normal;
    display: block;
    margin-top: 4px;
    font-size: 0.82rem;
    color: var(--espresso);
    opacity: 0.75;
  }

  /* ======================== SHARED VISUAL ELEMENTS ======================== */
  .icon-circle {
    width: 160px; height: 160px;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 35% 30%, var(--milk), var(--cream-deep));
    border-radius: 50%;
    box-shadow: inset -6px -8px 16px rgba(110,78,55,0.08), var(--shadow);
  }
  .icon-circle svg { width: 70%; height: 70%; }

  .equation {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; flex-wrap: wrap;
  }
  .eq-item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .eq-box {
    width: 76px; height: 76px;
    display: flex; align-items: center; justify-content: center;
    background: var(--milk); border-radius: 20px;
    box-shadow: inset -3px -4px 8px rgba(110,78,55,0.07), 0 4px 10px rgba(62,39,35,0.08);
  }
  .eq-box svg { width: 70%; height: 70%; }
  .eq-sign {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem; font-weight: 600; color: var(--ink);
  }
  .eq-caption {
    font-family: 'Caveat', cursive;
    color: var(--ink); font-size: 1.1rem;
    font-weight: 700; line-height: 1;
  }
  .eq-caption small {
    display: block;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.7rem; color: var(--coffee);
    font-weight: 500; margin-top: 2px;
  }
  .flow {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; flex-wrap: wrap;
  }
  .flow-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .flow-arrow { font-family: 'Fraunces', serif; font-size: 1.6rem; color: var(--ink); }
  .result-badge {
    display: inline-block; padding: 10px 22px;
    background: var(--espresso); color: var(--cream);
    border-radius: 999px;
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 1.2rem;
    box-shadow: var(--shadow);
  }
  .result-badge .zh {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600; font-size: 0.95rem;
    margin-left: 8px; opacity: 0.9;
  }
  .bracket-row {
    display: grid; grid-template-columns: auto 1fr;
    align-items: center; gap: 14px;
    width: 100%; max-width: 300px;
  }
  .bracket {
    font-family: 'Fraunces', serif;
    font-size: 5rem; color: var(--ink);
    line-height: 0.8; font-weight: 300;
  }
  .bracket-items { display: flex; flex-direction: column; gap: 14px; }
  .bracket-item {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Caveat', cursive;
    color: var(--ink); font-size: 1.3rem; font-weight: 700;
  }
  .bracket-item .zh-small {
    font-family: 'Noto Serif SC', serif;
    font-weight: 500; font-size: 0.85rem; color: var(--coffee);
  }
  .steam { animation: steam 3s ease-in-out infinite; transform-origin: center bottom; }
  @keyframes steam {
    0%, 100% { opacity: 0.6; transform: translateY(0) scaleY(1); }
    50% { opacity: 1; transform: translateY(-4px) scaleY(1.1); }
  }

  /* ======================== NAV BUTTONS (slide view) ======================== */
  .nav-buttons {
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 14px;
    z-index: 5;
  }
  .nav-btn {
    width: 48px; height: 48px; border: none;
    background: var(--espresso); color: var(--cream);
    border-radius: 50%; cursor: pointer; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    transition: transform .15s, opacity .2s;
    box-shadow: var(--shadow);
  }
  .nav-btn:active:not(:disabled) { transform: scale(0.92); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ======================== FLASHCARD VIEW ======================== */
  .flashcard-view { display: flex; flex-direction: column; }
  .flashcard-stage {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; gap: 20px;
    overflow: hidden;
  }
  .flashcard {
    width: 100%; max-width: 340px;
    aspect-ratio: 3/4;
    perspective: 1000px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform .6s;
    transform-style: preserve-3d;
  }
  .flashcard.flipped .card-inner { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    background: var(--milk);
    border-radius: 28px;
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; gap: 16px; text-align: center;
  }
  .card-face.back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, var(--cream-deep), var(--milk));
  }
  .card-hint {
    position: absolute;
    top: 14px; right: 16px;
    font-family: 'Caveat', cursive;
    font-size: 0.9rem; color: var(--coffee); opacity: 0.5;
  }
  .card-face .card-category {
    font-family: 'Caveat', cursive;
    color: var(--caramel);
    font-size: 1rem; font-weight: 700;
  }
  .card-face .it-big {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 1.8rem;
    color: var(--espresso);
    line-height: 1.1;
  }
  .card-face .it-big em { color: var(--coffee); font-style: italic; }
  .card-face .zh-big {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--coffee);
  }
  .card-face .desc-small {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--coffee);
    opacity: 0.8;
  }
  .card-face .desc-small-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.8rem;
    color: var(--espresso);
    opacity: 0.7;
    margin-top: 4px;
  }

  .card-controls {
    display: flex; gap: 12px;
    width: 100%; max-width: 340px;
  }
  .card-ctrl {
    flex: 1;
    padding: 14px;
    border: none; border-radius: 16px;
    font-family: 'Fraunces', serif;
    font-weight: 700; font-size: 0.95rem;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform .15s;
  }
  .card-ctrl:active { transform: scale(0.96); }
  .card-ctrl.again {
    background: var(--milk); color: var(--coffee);
  }
  .card-ctrl.good {
    background: var(--leaf); color: white;
  }
  .card-ctrl small {
    display: block; font-family: 'Noto Serif SC', serif;
    font-size: 0.7rem; font-weight: 500;
    opacity: 0.75; margin-top: 2px;
  }

  .flashcard-empty {
    text-align: center; padding: 40px 30px;
    font-family: 'Fraunces', serif;
    color: var(--coffee); font-size: 1.1rem;
    line-height: 1.5;
  }
  .flashcard-empty .zh {
    display: block;
    font-family: 'Noto Serif SC', serif;
    margin-top: 8px;
    font-size: 0.95rem;
  }

  /* ======================== FAVORITES VIEW ======================== */
  .fav-view { padding: 0; }
  .fav-list { padding: 14px 16px 24px; display: flex; flex-direction: column; gap: 10px; }
  .fav-item {
    background: var(--milk);
    padding: 14px 16px;
    border-radius: 16px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    border: none; width: 100%;
    font-family: inherit;
    text-align: left;
  }
  .fav-item:active { transform: scale(0.98); }
  .fav-item-text { flex: 1; }
  .fav-item-it {
    font-family: 'Fraunces', serif;
    font-weight: 700; font-size: 1.05rem;
    color: var(--espresso);
  }
  .fav-item-zh {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem; color: var(--coffee);
    margin-top: 2px;
  }
  .fav-item-tts {
    width: 36px; height: 36px;
    border: none; background: var(--cream-deep);
    border-radius: 50%; cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .empty-state {
    padding: 60px 30px; text-align: center;
    font-family: 'Fraunces', serif;
    color: var(--coffee); line-height: 1.5;
  }
  .empty-state .big-icon { font-size: 3rem; margin-bottom: 12px; display: block; opacity: 0.5; }
  .empty-state .zh { display: block; margin-top: 8px; font-family: 'Noto Serif SC', serif; font-size: 0.9rem; }

  /* ======================== BOTTOM TAB BAR ======================== */
  .tabbar {
    display: flex;
    background: white;
    border-top: 1px solid rgba(110,78,55,0.1);
    padding: 6px 0 calc(6px + var(--safe-bottom));
    box-shadow: 0 -4px 10px rgba(62,39,35,0.05);
    z-index: 10;
  }
  .tab-btn {
    flex: 1; border: none; background: none;
    padding: 8px 4px; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    color: var(--coffee); opacity: 0.55;
    transition: opacity .2s;
    font-family: inherit;
  }
  .tab-btn.active { opacity: 1; color: var(--espresso); }
  .tab-btn .tab-icon { font-size: 1.35rem; }
  .tab-btn .tab-label {
    font-size: 0.65rem; font-weight: 700;
    font-family: 'Fraunces', serif;
  }

  /* ======================== INSTALL PROMPT ======================== */
  .install-prompt {
    position: fixed;
    bottom: 80px; left: 16px; right: 16px;
    background: var(--espresso); color: var(--cream);
    padding: 14px 16px; border-radius: 18px;

const CATEGORIES = [
  { key: 'Origine',         zh: '起源',   icon: '🌱' },
  { key: 'Trasformazione',  zh: '转化',   icon: '🔥' },
  { key: 'Preparazione',    zh: '冲煮',   icon: '☕' },
  { key: 'Bevande',         zh: '饮品',   icon: '🥛' }
];

/* ==================== STATE ==================== */
const STORAGE_KEYS = {
  fav: 'caffe-app-favorites',
  learned: 'caffe-app-learned',
  last: 'caffe-app-last-position'
};
let state = {
  view: 'home',
  currentLessons: [],
  slideIndex: 0,
  fcIndex: 0,
  fcFlipped: false,
  favorites: JSON.parse(localStorage.getItem(STORAGE_KEYS.fav) || '[]'),
  learned:   JSON.parse(localStorage.getItem(STORAGE_KEYS.learned) || '[]'),
};

function saveState() {
  localStorage.setItem(STORAGE_KEYS.fav, JSON.stringify(state.favorites));
  localStorage.setItem(STORAGE_KEYS.learned, JSON.stringify(state.learned));
  updateHomeStats();
  updateFavCount();
}

/* ==================== HOME ==================== */
function renderHome() {
  const grid = document.getElementById('categoriesGrid');
  grid.innerHTML = CATEGORIES.map(cat => {
    const count = LESSONS.filter(l => l.category === cat.key).length;
    return `
      <button class="cat-card" onclick="startLearn('${cat.key}')">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-name">${cat.key}</div>
        <div class="cat-name-zh">${cat.zh}</div>
        <div class="cat-count">${count} lezioni · ${count} 课</div>
      </button>`;
  }).join('');
  updateHomeStats();
}
function updateHomeStats() {
  document.getElementById('statTotal').textContent   = LESSONS.length;
  document.getElementById('statLearned').textContent = state.learned.length;
  document.getElementById('statFav').textContent     = state.favorites.length;
}
function updateFavCount() {
  document.getElementById('favCount').textContent = state.favorites.length;
}

/* ==================== VIEW ROUTING ==================== */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById('view-' + name);
  if (target) target.classList.add('active');
  state.view = name;
  document.querySelectorAll('.tab-btn').forEach(t => {
    t.classList.toggle('active', t.dataset.view === name);
  });
  if (name === 'flashcard') startFlashcards();
  if (name === 'fav') renderFavorites();
  if (name === 'home') renderHome();
}

/* ==================== LEARN MODE ==================== */
function startLearn(category) {
  if (category === 'all') state.currentLessons = [...LESSONS];
  else state.currentLessons = LESSONS.filter(l => l.category === category);
  if (state.currentLessons.length === 0) return;
  state.slideIndex = 0;
  renderSlides();
  showView('lesson');
}

function renderSlides() {
  const container = document.getElementById('slideContainer');
  container.innerHTML = state.currentLessons.map((l, i) => renderSlide(l, i)).join('');
  showSlide(0);
}

function renderSlide(l, i) {
  const isFav = state.favorites.includes(l.id);
  const isLearned = state.learned.includes(l.id);
  return `
    <div class="slide${i === 0 ? ' active' : ''}" data-index="${i}">
      <div class="slide-category">${l.category} · ${l.category_zh}</div>
      <div class="slide-head">
        <h1 class="it-title">${l.it}</h1>
        <h2 class="zh-title">${l.zh}</h2>
        <div class="action-row">
          <button class="action-btn" onclick="speakLesson('${l.id}')" aria-label="Pronuncia">🔊</button>
          <button class="action-btn ${isFav ? 'active-fav' : ''}" onclick="toggleFav('${l.id}', this)" aria-label="Preferito">❤️</button>
          <button class="action-btn ${isLearned ? 'active-learn' : ''}" onclick="toggleLearned('${l.id}', this)" aria-label="Imparato">✓</button>
        </div>
      </div>
      <div class="slide-body">${l.body}</div>
      <div class="slide-foot">${l.foot_it}<span class="zh">${l.foot_zh}</span></div>
    </div>`;
}

function showSlide(i) {
  const slides = document.querySelectorAll('#slideContainer .slide');
  slides.forEach(s => s.classList.remove('active'));
  if (slides[i]) slides[i].classList.add('active');
  state.slideIndex = i;
  const total = state.currentLessons.length;
  document.getElementById('pageIndicator').textContent = `${i+1}/${total}`;
  document.getElementById('progressFill').style.width = `${((i+1)/total)*100}%`;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === total - 1;
}
function nextSlide() { if (state.slideIndex < state.currentLessons.length - 1) showSlide(state.slideIndex + 1); }
function prevSlide() { if (state.slideIndex > 0) showSlide(state.slideIndex - 1); }

/* ==================== FAV / LEARN TOGGLES ==================== */
function toggleFav(id, btn) {
  const idx = state.favorites.indexOf(id);
  if (idx >= 0) { state.favorites.splice(idx, 1); btn.classList.remove('active-fav'); }
  else { state.favorites.push(id); btn.classList.add('active-fav'); }
  saveState();
}
function toggleLearned(id, btn) {
  const idx = state.learned.indexOf(id);
  if (idx >= 0) { state.learned.splice(idx, 1); btn.classList.remove('active-learn'); }
  else { state.learned.push(id); btn.classList.add('active-learn'); }
  saveState();
}

/* ==================== FLASHCARDS ==================== */
function startFlashcards() {
  // shuffle
  state.fcDeck = [...LESSONS].filter(l => l.id !== 'cover' && l.id !== 'end');
  for (let i = state.fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [state.fcDeck[i], state.fcDeck[j]] = [state.fcDeck[j], state.fcDeck[i]];
  }
  state.fcIndex = 0;
  state.fcFlipped = false;
  renderFlashcard();
}

function renderFlashcard() {
  const stage = document.getElementById('flashcardStage');
  if (!state.fcDeck || state.fcDeck.length === 0) {
    stage.innerHTML = `<div class="flashcard-empty">Nessuna flashcard disponibile<span class="zh">暂无闪卡</span></div>`;
    return;
  }
  if (state.fcIndex >= state.fcDeck.length) {
    stage.innerHTML = `
      <div class="flashcard-empty">
        🎉<br>Hai finito tutte le card!
        <span class="zh">恭喜你学完所有闪卡！</span>
        <button class="card-ctrl good" style="margin-top:20px;max-width:200px;" onclick="startFlashcards()">
          Ricomincia<small>重新开始</small>
        </button>
      </div>`;
    return;
  }
  const l = state.fcDeck[state.fcIndex];
  const total = state.fcDeck.length;
  document.getElementById('fcIndicator').textContent = `${state.fcIndex+1}/${total}`;
  document.getElementById('fcProgress').style.width = `${((state.fcIndex+1)/total)*100}%`;
  stage.innerHTML = `
    <div class="flashcard ${state.fcFlipped ? 'flipped' : ''}" id="fcCard" onclick="flipCard()">
      <div class="card-inner">
        <div class="card-face front">
          <span class="card-hint">tocca per girare · 点击翻面</span>
          <div class="card-category">${l.category}</div>
          <div class="it-big">${l.it}</div>
          <button class="action-btn" style="margin-top:8px;" onclick="event.stopPropagation();speakLesson('${l.id}')">🔊</button>
          <div class="desc-small" style="margin-top:14px;">${l.foot_it}</div>
        </div>
        <div class="card-face back">
          <span class="card-hint">tocca per girare · 点击翻面</span>
          <div class="card-category">${l.category_zh}</div>
          <div class="zh-big">${l.zh}</div>
          <div class="desc-small-zh" style="margin-top:14px;">${l.foot_zh}</div>
        </div>
      </div>
    </div>
    <div class="card-controls">
      <button class="card-ctrl again" onclick="fcAnswer(false)">Di nuovo<small>再练一次</small></button>
      <button class="card-ctrl good" onclick="fcAnswer(true)">L'ho imparato<small>我会了</small></button>
    </div>`;
}

function flipCard() {
  state.fcFlipped = !state.fcFlipped;
  const c = document.getElementById('fcCard');
  if (c) c.classList.toggle('flipped', state.fcFlipped);
}

function fcAnswer(learned) {
  const l = state.fcDeck[state.fcIndex];
  if (learned && l && !state.learned.includes(l.id)) {
    state.learned.push(l.id);
    saveState();
  }
  state.fcIndex++;
  state.fcFlipped = false;
  renderFlashcard();
}

/* ==================== FAVORITES VIEW ==================== */
function renderFavorites() {
  const container = document.getElementById('favListContainer');
  if (state.favorites.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <span class="big-icon">⭐</span>
        Nessun preferito ancora<br>
        Tocca il cuore su una lezione per salvarla qui
        <span class="zh">还没有收藏<br>在课程上点击心形按钮即可收藏</span>
      </div>`;
    return;
  }
  const favLessons = state.favorites.map(id => LESSONS.find(l => l.id === id)).filter(Boolean);
  container.innerHTML = `<div class="fav-list">${favLessons.map(l => `
    <button class="fav-item" onclick="openLessonById('${l.id}')">
      <div class="fav-item-text">
        <div class="fav-item-it">${l.it}</div>
        <div class="fav-item-zh">${l.zh} · ${l.category_zh}</div>
      </div>
      <button class="fav-item-tts" onclick="event.stopPropagation();speakLesson('${l.id}')">🔊</button>
    </button>
  `).join('')}</div>`;
}

function openLessonById(id) {
  state.currentLessons = [...LESSONS];
  const idx = state.currentLessons.findIndex(l => l.id === id);
  renderSlides();
  showSlide(idx >= 0 ? idx : 0);
  showView('lesson');
}

/* ==================== TTS ==================== */
function speakLesson(id) {
  const l = LESSONS.find(x => x.id === id);
  if (!l) return;
  if (!('speechSynthesis' in window)) {
    alert('Il tuo browser non supporta la sintesi vocale.\n你的浏览器不支持语音合成。');
    return;
  }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(l.tts);
  u.lang = 'it-IT';
  u.rate = 0.9;
  // Try to find an Italian voice
  const voices = window.speechSynthesis.getVoices();
  const itVoice = voices.find(v => v.lang && v.lang.startsWith('it'));
  if (itVoice) u.voice = itVoice;
  window.speechSynthesis.speak(u);
}
// Preload voices
if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

/* ==================== KEYBOARD + SWIPE ==================== */
document.addEventListener('keydown', (e) => {
  if (state.view === 'lesson') {
    if (e.key === 'ArrowLeft') prevSlide();
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  } else if (state.view === 'flashcard') {
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
  }
});
let touchX = null;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX, { passive: true });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50 && state.view === 'lesson') {
    if (dx < 0) nextSlide(); else prevSlide();
  }
  touchX = null;
}, { passive: true });

/* ==================== FAV COUNTER BUTTON ==================== */
document.getElementById('favCounter').addEventListener('click', () => showView('fav'));

/* ==================== PWA ==================== */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const p = document.getElementById('installPrompt');
  if (!localStorage.getItem('install-dismissed')) {
    setTimeout(() => p.classList.add('show'), 3000);
  }
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const r = await deferredPrompt.userChoice;
  if (r.outcome === 'accepted') {
    localStorage.setItem('install-dismissed', '1');
    document.getElementById('installPrompt').classList.remove('show');
  }
  deferredPrompt = null;
});
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

/* ==================== INIT ==================== */
renderHome();
updateFavCount();
</script>

</body>
</html>
